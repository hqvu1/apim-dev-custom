[supervisord]
nodaemon=true
user=root
logfile=/dev/stdout
logfile_maxbytes=0
loglevel=info
pidfile=/var/run/supervisord.pid

[program:nginx]
command=nginx -g "daemon off;"
autostart=true
autorestart=true
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0
user=root
priority=100

[program:bff]
command=/usr/share/dotnet/dotnet /app/bff/BffApi.dll
directory=/app/bff
autostart=true
autorestart=true
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0
user=nginx
environment=ASPNETCORE_ENVIRONMENT="Production",ASPNETCORE_URLS="http://+:3001",DOTNET_SYSTEM_GLOBALIZATION_INVARIANT="false",Apim__SubscriptionId="%(ENV_AZURE_SUBSCRIPTION_ID)s",Apim__ResourceGroup="%(ENV_AZURE_RESOURCE_GROUP)s",Apim__ServiceName="%(ENV_APIM_SERVICE_NAME)s",Apim__ApiVersion="%(ENV_APIM_API_VERSION)s",Apim__ManagedIdentityClientId="%(ENV_MANAGED_IDENTITY_CLIENT_ID)s",Apim__ServicePrincipal__TenantId="%(ENV_APIM_SP_TENANT_ID)s",Apim__ServicePrincipal__ClientId="%(ENV_APIM_SP_CLIENT_ID)s",Apim__ServicePrincipal__ClientSecret="%(ENV_APIM_SP_CLIENT_SECRET)s",Apim__ArmScope="%(ENV_APIM_ARM_SCOPE)s",Apim__DataApiScope="%(ENV_APIM_DATA_API_SCOPE)s",EntraId__TenantId="%(ENV_ENTRA_TENANT_ID)s",EntraId__ClientId="%(ENV_ENTRA_CLIENT_ID)s",EntraId__ExternalTenantId="%(ENV_ENTRA_EXTERNAL_TENANT_ID)s",EntraId__CiamHost="%(ENV_ENTRA_CIAM_HOST)s",Features__UseMockMode="%(ENV_USE_MOCK_MODE)s",AZURE_CLIENT_ID="%(ENV_MANAGED_IDENTITY_CLIENT_ID)s"
priority=200
